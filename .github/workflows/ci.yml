name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint check
        run: |
          # We can add lint checks like flake8, ruff, or black here if configured.
          echo "Skipping lint for now"

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          # Since the frontend will be initialized, we can install dependencies if package.json exists
          if [ -f package.json ]; then
            npm ci
            npm run build --if-present
          else
            echo "Frontend not yet initialized, skipping"
          fi
